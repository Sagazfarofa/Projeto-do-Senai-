<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="post">
        <input type="password" name="senha" placeholder="Digite a senha">
        <button>Entrar</button>
    </form>
</div>

</body>
</html>
